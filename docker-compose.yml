services:
  app:
    image: ${DOCKER_USERNAME}/lacrei-api:${IMAGE_TAG:-latest}
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ec2-user/certs/nginx-selfsigned.crt:/etc/nginx/certs/nginx-selfsigned.crt:ro
      - /home/ec2-user/certs/nginx-selfsigned.key:/etc/nginx/certs/nginx-selfsigned.key:ro
    depends_on:
      - app