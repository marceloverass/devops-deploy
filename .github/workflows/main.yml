name: CI-CD Lacrei Saude

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lacrei-api:latest,${{ secrets.DOCKER_USERNAME }}/lacrei-api:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código (para pegar o docker-compose e nginx.conf)
        uses: actions/checkout@v4

      - name: Definir IP do Ambiente
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_IP=${{ secrets.PRODUCTION_IP }}" >> $GITHUB_ENV
          else
            echo "TARGET_IP=${{ secrets.STAGING_IP }}" >> $GITHUB_ENV
          fi

      - name: Copiar arquivos de config para a AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.TARGET_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx/default.conf"
          target: "~/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.TARGET_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            # Exporta a tag do commit para o docker-compose usar a imagem exata
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            docker pull ${{ secrets.DOCKER_USERNAME }}/lacrei-api:${{ github.sha }}
            
            docker-compose down
            docker-compose up -d