name: Pipeline Lacrei Saude

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ETAPA 1: Baixar o código do repositório para dentro da máquina virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # ETAPA 2: Fazer login no Docker Hub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ETAPA 3: Construir a imagem Docker e enviar para o Docker Hub
      - name: Build and Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lacrei-api:latest