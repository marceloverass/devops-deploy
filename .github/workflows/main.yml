name: CI/CD Lacrei Saude

on:
  push:
    [cite_start]branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lacrei-api:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Definir IP do Ambiente
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_IP=${{ secrets.PRODUCTION_IP }}" >> $GITHUB_ENV
          else
            echo "TARGET_IP=${{ secrets.STAGING_IP }}" >> $GITHUB_ENV
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.TARGET_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/lacrei-api:${{ github.sha }}
            docker stop lacrei-app || true
            docker rm lacrei-app || true
            docker run -d --name lacrei-app -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/lacrei-api:${{ github.sha }}